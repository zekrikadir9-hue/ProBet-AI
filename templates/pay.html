<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل باقة VIP</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .payment-card { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #00ff88; max-width: 400px; margin: 0 auto; box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        .method { background: #222; margin: 15px 0; padding: 15px; border-radius: 12px; border-right: 5px solid #00ff88; text-align: right; }
        .method h3 { color: #00ff88; margin: 0 0 10px 0; font-size: 1.1rem; }
        .method p { margin: 5px 0; font-family: monospace; letter-spacing: 1px; color: #eee; font-size: 1rem; }
        .upload-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .upload-btn { background: #00ff88; color: black; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        input[type="file"] { margin: 15px 0; color: #888; }
        .copy-hint { font-size: 0.7rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>تفعيل باقة الـ VIP 💎</h2>
    <p style="color: #bbb;">قم بالتحويل ثم ارفع صورة الوصل للتفعيل</p>

    <div class="payment-card">
        <div class="method">
            <h3>بريدي موب (Baridimob)</h3>
            <p>RIP: 00799999002210390713</p>
            <p>الإسم: ZEKRI KADIR</p>
            <span class="copy-hint">* يرجى التأكد من الرقم قبل الإرسال</span>
        </div>

        <div class="upload-section">
            <form action="/upload" method="post" enctype="multipart/form-data">
                <label>ارفع صورة وصل التحويل (Screenshot):</label>
                <input type="file" name="receipt" accept="image/*" required>
                <button type="submit" class="upload-btn">إرسال لتأكيد الاشتراك</button>
            </form>
        </div>
    </div>

    <br>
    <a href="/" style="color: #666; text-decoration: none;">← العودة للمباريات</a>
</body>
</html>
